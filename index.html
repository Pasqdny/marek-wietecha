<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marek Wietecha | Quality Control & Metrology Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#071a2f;
            color:white;
        }

        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:25px 8%;
            position:fixed;
            width:100%;
            background:rgba(7,26,47,.95);
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#35b7ff;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            transition:.3s;
        }

        nav a:hover{
            color:#35b7ff;
        }

        .hero{
            min-height:100vh;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:140px 8%;
        }

        .hero-text{
            max-width:650px;
        }

        h1{
            font-size:60px;
            margin-bottom:15px;
        }

        h2{
            color:#35b7ff;
            font-weight:400;
            margin-bottom:20px;
        }

        .motto{
            font-size:22px;
            color:#d8d8d8;
            margin-bottom:35px;
        }

        .stats{
            display:flex;
            gap:40px;
            margin-bottom:40px;
            flex-wrap:wrap;
        }

        .stat{
            text-align:center;
        }

        .number{
            font-size:42px;
            font-weight:bold;
            color:#35b7ff;
        }

        .buttons{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .btn{
            padding:14px 28px;
            background:#35b7ff;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
        }

        .photo img{
            width:360px;
            border-radius:20px;
            box-shadow:0 0 35px rgba(53,183,255,.35);
        }

        @media(max-width:900px){

            header{
                flex-direction:column;
                gap:20px;
            }

            .hero{
                flex-direction:column-reverse;
                text-align:center;
                padding-top:180px;
            }

            .photo img{
                width:280px;
                margin-bottom:40px;
            }

            .stats{
                justify-content:center;
            }

            .buttons{
                justify-content:center;
            }

            h1{
                font-size:42px;
            }
        }
    </style>

</head>

<body>

<header>

<div class="logo">MW</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Experience</a>
<a href="#">Certificates</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<div class="hero-text">

<h1>Marek Wietecha</h1>

<h2>Quality Control & Metrology Specialist</h2>

<p class="motto">
Precision. Quality. Continuous Improvement.
</p>

<div class="stats">

<div class="stat">
<div class="number">20+</div>
<div>Years</div>
</div>

<div class="stat">
<div class="number">100+</div>
<div>Courses</div>
</div>

<div class="stat">
<div class="number">3D</div>
<div>Scanning • CMM</div>
</div>

</div>

<div class="buttons">

<a class="btn" href="#">
Download CV
</a>

<a class="btn" href="#">
Contact Me
</a>

</div>

</div>

<div class="photo">

<img src="images/profile.png" alt="Marek Wietecha">

</div>

</section>

</body>
</html>
